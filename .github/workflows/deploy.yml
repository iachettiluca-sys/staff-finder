name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar credenciales Supabase
        run: |
          mkdir -p _site
          sed \
            -e "s|SUPABASE_URL_PLACEHOLDER|${{ secrets.SUPABASE_URL }}|g" \
            -e "s|SUPABASE_ANON_KEY_PLACEHOLDER|${{ secrets.SUPABASE_ANON_KEY }}|g" \
            frontend/index.html > _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
